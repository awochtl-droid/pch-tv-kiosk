plugins {
    id 'com.android.application'
}

android {
    namespace 'com.pch.kiosk'
    compileSdk 34

    defaultConfig {
        applicationId "com.pch.kiosk"
        minSdk 22          // Fire TV runs API 22+
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No dependencies needed — just Android WebView
}
